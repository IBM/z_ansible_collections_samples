    changes:
      fixed:
        - Lower case zos_data_set module option 'type' per ibm.ibm_zos_core:1.10.0 requirements.
        - Lower case zos_data_set module option 'space_type' per ibm.ibm_zos_core:1.10.0 requirements.
        - Lower case zos_data_set module option 'record_format' per ibm.ibm_zos_core:1.10.0 requirements.
        - Lower case zos_job_submit module option 'location' per ibm.ibm_zos_core:1.10.0 requirements.
  2026.06.15:
    date: 2026-06-15
    changes:
      fixed:
        - Rename option 'location' to 'remote_src' and change parameter from string to boolean per ibm.ibm_zos_core:2.0.0 zos_job_submit breaking changes.
        - Rename option 'wait_time_s' to 'wait_time' per ibm.ibm_zos_core:2.0.0 zos_job_submit breaking changes.
