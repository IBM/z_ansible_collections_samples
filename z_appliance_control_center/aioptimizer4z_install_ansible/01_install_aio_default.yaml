- name: ACC playbook, run by appliance-owner for installing IBM AI Optimizer for IBM Z and IBM Linux ONE Application
  hosts: localhost
  gather_facts: true
  vars_files:
    - env_vars_aiopt.yaml

  pre_tasks:
    - name: Reminder - Export credentials
      ansible.builtin.pause:
        prompt: |


          Before running this playbook, please export credentials:

          export ACC_AIO_OWNER_DEFAULT_PASSWORD=<aio_owner_default_password>
          export ACC_AIO_OWNER_PASSWORD=<aio_owner_new_password>

          export AIO_USERNAME=<aio_appliance_username>
          export AIO_PASSWORD=<aio_appliance_password>
          Press Ctrl+C now to cancel if you haven't done this.
          The playbook will continue shortly.

        seconds: 5

    - name: Check required environment variables
      vars:
        required_env_vars:
          - ACC_AIO_OWNER_DEFAULT_PASSWORD
          - ACC_AIO_OWNER_PASSWORD
          - AIO_USERNAME
          - AIO_PASSWORD

      ansible.builtin.fail:
        msg: "Missing required environment variable: {{ item }}"
      when: lookup('env', item) == ""
      loop: "{{ required_env_vars }}"

    - name: "Reminder for Re-run"
      tags: retry
      ansible.builtin.pause:
        prompt: |

          REMINDER: If you need to re-run this playbook, certain tasks may fail
          during subsequent executions. To prevent these failures, comment
          out the applicable tasks listed below that were successfully completed
          in previous runs.

            01 - Create an appliance-owner in ACC for IBM AI Optimizer for IBM Z and IBM Linux ONE Application appliance
            02 - Assign resources in ACC to the IBM AI Optimizer for IBM Z and IBM Linux ONE appliance-owner created in step 01
            04 - Update the password of IBM AI Optimizer for IBM Z and IBM Linux ONE Application appliance-owner
            06 - Upload the IBM AI Optimizer for IBM Z and IBM Linux ONE Application appliance image to the ACC

          The above tasks should only be executed once, otherwise errors may occur.

          If you are re-running this playbook due to an error that occurred during
          or after the execution of task '06 - Upload the IBM AI Optimizer for IBM Z and IBM Linux ONE Application appliance image to the ACC'. The
          tag 'retry' can be used to skip all of the problematic tasks.
          For example: ansible-playbook 01_install_aio_default.yaml -t retry

          Press enter (or ctrl+C then C) to continue.
          If you want to abort and modify this playbook, press Ctrl+C then A.

  vars_prompt:
    - name: cc_admin_user
      prompt: "Enter ACC LPAR's username"
      private: false

    - name: cc_admin_password
      prompt: "Enter ACC-admin password"
      private: true

    - name: update_owner_pass
      prompt: "Do you want to update the owner password? If you have already, then please type no (yes/no)"
      private: false
      default: "yes"

  tasks:
    - name: Prepare execution_action
      tags: retry
      ansible.builtin.set_fact:
        execution_action: "{{ execution_action }}"

    - name: Printing execution_action
      tags: admin, owner, retry
      ansible.builtin.debug:
        msg: "{{ execution_action }}"

    - name: Wait for user to generate admin OTP with mfa_secret
      tags: admin
      ansible.builtin.pause:
        prompt: "Enter OTP generated from your admin mfa_secret (press Enter if MFA is not enabled):"
      register: mfa_admin_otp_input
      when: mfa_enabled | bool

    - name: Get authentication token from the ACC as admin
      tags: admin
      ansible.builtin.uri:
        url: "{{ acc_url }}/user/token"
        body:
          username: "{{ cc_admin_user }}"
          password: "{{ cc_admin_password }}"
          otp: "{{ (mfa_admin_otp_input.user_input if mfa_enabled else omit) }}"
        body_format: json
        method: POST
        return_content: true
        validate_certs: false
      register: auth_response

    - name: Extract the ACC-admin's token
      tags: admin
      ansible.builtin.set_fact:
        access_token: "{{ auth_response.json.access_token }}"

    - name: 01 - Create an appliance-owner in ACC for IBM AI Optimizer for IBM Z and IBM Linux ONE Application appliance
      tags: admin
      ansible.builtin.uri:
        url: "{{ acc_url }}/user"
        method: POST
        body:
          username: "{{ cc_owner_user }}"
          password: "{{ cc_owner_default_password }}"
          email: "{{ cc_owner_email }}"
          role: "owner"
        body_format: json
        headers:
          Authorization: "Bearer {{ access_token }}"
          Content-Type: application/json
        status_code: 204
        validate_certs: false
      register: response

    - name: 02 - Assign resources in ACC to the IBM AI Optimizer for IBM Z and IBM Linux ONE appliance-owner created in step 01
      tags: admin
      block:
        - name: Gathering Network Parameters for LPARs
          ansible.builtin.set_fact:
            var_details1:
              name: "{{ interface1_name }}"
              prefix: "{{ prefix1 }}"
              ip: "{{ app1_ip }}"
              gw: "{{ gw1_ip }}"

        - name: IMPORTANT - Network Card Type Selection
          ansible.builtin.debug:
            msg: |
              Select the correct network card type based on the system configuration.
              Selection Criteria:
                - If CHPID and Port are provided -> choose OSA
                - If FID is provided -> choose NETH

        - name: Enter network card type for LPAR
          ansible.builtin.pause:
            prompt: "Enter network card type to be used for LPAR {{ lpar1_name }}: (OSA/NETH)"
          register: net1_type_raw

        - name: Normalize network type 1
          ansible.builtin.set_fact:
            net1_type: "{{ net1_type_raw.user_input | trim | upper }}"

        - name: Validate network type
          ansible.legacy.fail:
            msg: "Invalid input! Allowed values: OSA, NETH"
          when: net1_type not in ['OSA', 'NETH']

        - name: VLAN configuration
          ansible.builtin.pause:
            prompt: "Does the LPAR {{ lpar1_name }} need VLAN configuration? (yes/no)"
          register: vlan1_raw

        - name: Normalize VLAN input for LPAR1
          ansible.builtin.set_fact:
            vlan_1: "{{ (vlan1_raw.user_input | trim | lower) == 'yes' }}"

        - name: Validate VLAN confirmation
          ansible.builtin.fail:
            msg: "Invalid input"
          when: vlan1_raw.user_input | trim | lower not in ['yes', 'no']

        - name: IMPORTANT - Boot Disk Selection
          ansible.builtin.debug:
            msg: |
              Select the correct disk type based on the system configuration.
                - For FCP disk, ensure that valid values for 'wwpn*' and 'lun*' are provided
                - For DASD disk, the 'wwpn' and 'lun' values are not required

        - name: Enter boot disk type for LPAR [DASD/FCP]
          ansible.builtin.pause:
            prompt: "Enter boot disk type for LPAR {{ lpar1_name }}: (DASD/FCP)"
          register: is_fcp1_raw

        - name: Normalize boot disk
          ansible.builtin.set_fact:
            is_fcp_1: "{{ is_fcp1_raw.user_input | trim | upper }}"

        - name: Validate disk type
          ansible.legacy.fail:
            msg: "Invalid input"
          when: is_fcp_1 not in ['DASD', 'FCP']

        - name: Entered values for network by the user
          ansible.builtin.debug:
            msg:
              - "LPAR1 Network Type: {{ net1_type }}"
              - "LPAR1 VLAN Usage: {{ vlan1_raw.user_input }}"
              - "LPAR1 Boot Disk Type: {{ is_fcp_1 }}"

        - name: Preparing OSA params for "{{ lpar1_name }}"
          ansible.builtin.set_fact:
            nw1_details: >-
              {{ var_details1
                  | combine({'chpid': chpid1, 'port': zport1})
                  | combine(vlan_1 | ternary({'vlan_id':vlan1_id}, {})
                  ) }}
          when: net1_type == 'OSA'

        - name: Preparing NETH params for {{ lpar1_name }}
          ansible.builtin.set_fact:
            nw1_details: "{{ var_details1 | combine({'fid': fid1}) | combine(vlan_1 | ternary({'vlan_id': vlan1_id}, {})) }}"
          when: net1_type == 'NETH'

        - name: Preparing boot params for {{ lpar1_name }}
          ansible.builtin.set_fact:
            boot1_info: "{{ {'disk-id': disk1_id} | combine((is_fcp_1 == 'FCP') | ternary({'is-fcp': true, 'wwpn': wwpn1, 'lun': lun1}, {'is-fcp': false})) }}"

        - name: Creating the API request for resource pkg creation
          ansible.builtin.set_fact:
            body: >-
              {{
                {
                  'owner': cc_owner_user,
                  'name': Aioptimizer4z_package_name,
                  'ifls': ifls,
                  'gps': gps,
                  'memory': memory,
                  'lpars':[
                    {
                      'name': lpar1_name,
                      'interfaces':[ nw1_details ],
                      'boot-info': boot1_info
                      }
                  ],
                  'cpc':  z_machine_name,
                  'x86': "dummy"
                }
              }}
        - name: Resource package request body
          ansible.builtin.debug:
            var: body

        - name: Submitting the request to ACC to create package with IBM AI Optimizer for IBM Z and IBM Linux ONE Application LPAR
          tags: admin
          ansible.builtin.uri:
            url: "{{ acc_url }}/resource/pkgs"
            timeout: 300
            method: POST
            body: "{{ body }}"

            body_format: json
            headers:
              Authorization: "Bearer {{ access_token }}"
              Content-Type: application/json
            validate_certs: false
            status_code: 200
          register: response

        - name: Printing the response for create package
          tags: owner, install
          ansible.builtin.debug:
            msg: "{{ response.json }}"

        - name: Check if IBM AI Optimizer for IBM Z and IBM Linux ONE Application LPAR is already activated
          vars:
            lpars_sync_list: "{{ response.json.lpars_sync_scheduled | from_yaml }}"
          when: lpars_sync_list | length > 0
          ansible.builtin.fail:
            msg: >

              ⚠️ WARNING: One or more LPARs are in *Operating* state in HMC.
              Please be cautious before performing installation.
              LPARs: {{ lpars_sync_list }}

    - name: 03 - Generate temporary 2FA secret for owner
      tags: owner
      ansible.builtin.uri:
        url: "{{ acc_url }}/mfa/secret/owner"
        body:
          username: "{{ cc_owner_user }}"
        body_format: json
        headers:
          Authorization: "Bearer {{ access_token }}"
          Content-Type: application/json
        method: POST
        return_content: true
        validate_certs: false
      register: totp_response
      when:
        - mfa_enabled | bool
        - update_owner_pass | lower == "yes"

    - name: Print create owner totp secret response
      tags: owner
      ansible.builtin.debug:
        var: totp_response.json
      when:
        - mfa_enabled | bool
        - update_owner_pass | lower == "yes"

    - name: Show the temporary OTP secret for owner
      tags: owner
      ansible.builtin.debug:
        msg:
          - "Please copy this TOTP secret and generate OTP using any authenticator app to update owner password:"
          - "{{ totp_response.json.secret }}"
      when:
        - mfa_enabled | bool
        - update_owner_pass | lower == "yes"

    - name: Wait for user to generate OTP
      tags: owner
      ansible.builtin.pause:
        prompt: "Enter owner OTP generated from the above totp_secret:"
      register: otp_input
      when:
        - mfa_enabled | bool
        - update_owner_pass | lower == "yes"

    - name: 04 - Update the password of IBM AI Optimizer for IBM Z and IBM Linux ONE Application appliance-owner
      tags: owner
      ansible.builtin.uri:
        url: "{{ acc_url }}/user"
        body:
          username: "{{ cc_owner_user }}"
          old_password: "{{ cc_owner_default_password }}"
          new_password: "{{ cc_owner_password }}"
          otp: "{{ (otp_input.user_input if mfa_enabled else omit) }}"
        body_format: json
        method: PUT
        validate_certs: false
        return_content: true
      register: owner_update_password_response
      when: update_owner_pass | lower == "yes"

    - name: Print owner password update response
      tags: owner
      ansible.builtin.debug:
        var: owner_update_password_response.json
      when:
        - mfa_enabled | bool
        - update_owner_pass | lower == "yes"

    - name: Show owner MFA secret
      tags: owner
      ansible.builtin.debug:
        msg:
          - "Owner Password updated successfully. The following is your MFA secret. Paste this into your authenticator app."
          - ---- **** IMPORTANT ****: This secret will be displayed only once. Please save it securely. ----:"
          - "{{ owner_update_password_response.json.mfa_secret }}"
      when:
        - mfa_enabled | bool
        - update_owner_pass | lower == "yes"

    - name: Wait for user to generate OTP for owner
      tags: owner, retry
      ansible.builtin.pause:
        prompt: "Enter OTP generated from the above owner mfa_secret:"
      register: mfa_owner_otp_input
      when:
        - mfa_enabled | bool
        - update_owner_pass | lower == "yes"

    - name: 05 - Get authentication token from the ACC as appliance-owner
      tags: owner, retry
      ansible.builtin.uri:
        url: "{{ acc_url }}/user/token"
        method: POST
        body:
          username: "{{ cc_owner_user }}"
          password: "{{ cc_owner_password }}"
          otp: "{{ (mfa_owner_otp_input.user_input if mfa_enabled else omit) }}"
        body_format: json
        return_content: true
        validate_certs: false
      register: auth_response

    - name: Extract the owner token
      tags: owner, retry
      ansible.builtin.set_fact:
        access_token: "{{ auth_response.json.access_token }}"

    - name: 06 - Upload the IBM AI Optimizer for IBM Z and IBM Linux ONE Application appliance image to the ACC
      tags: owner
      ansible.builtin.shell: 'curl -k -X "POST" \
        "{{ acc_url }}/images" \
        -H "Authorization: Bearer {{ access_token }}" \
        -H "Content-Type: multipart/form-data" \
        -F "data=@{{ image_path }}" \
        -F "image_type={{ image_type }}" \
        -F "min_ifls={{ min_ifls }}" -F "min_memory={{ min_memory }}"'
      register: response
      changed_when: false
      failed_when: >
        response.rc != 0 or
        (response.stdout is defined and 'exception' in response.stdout | lower)
      # noqa command-instead-of-module command-instead-of-shell

    - name: 07 - Get image information
      tags: owner, retry
      ansible.builtin.uri:
        url: "{{ acc_url }}/images"
        method: GET
        headers:
          Authorization: "Bearer {{ access_token }}"
          Content-Type: application/json
        validate_certs: false
      register: response
      failed_when: response.json.images | length == 0

    - name: Printing the response for upload image
      tags: owner, install, retry
      ansible.builtin.debug:
        msg: "{{ response.json }}"

    - name: Extract the image ID from the DB
      tags: owner, install, retry
      ansible.builtin.set_fact:
        image_id: "{{ response.json.images[-1].id }}"

    - name: 08 - As owner, install and activate the image
      tags: owner, retry
      ansible.builtin.uri:
        url: "{{ acc_url }}/cluster/activate"
        method: POST
        body: |
          {
            "{{ Aioptimizer4z_package_name }}":
            {
              "image_id": {{ image_id }},
              "processor_usage": "{{ processor_usage }}",
              "processor_type": "{{ processor_type }}",
              "memory": {{ app_memory }},
              "cores": {{ app_cores }},
              "username": "{{ app_username }}",
              "password": "{{ app_password }}",
              "hostname": "{{ hostname }}",
              "lpars": [
                  {
                    "name": "{{ lpar1_name }}",
                    "execution_action": "{{ execution_action }}",
                    "install": "{{ install }}"
                  }
                ]
              }
            }
        body_format: json
        headers:
          Authorization: "Bearer {{ access_token }}"
          Content-Type: application/json
        status_code: [200, 207]
        validate_certs: false
      register: response

    - name: Debug message for partial failure (207)
      tags: owner, install, retry
      ansible.builtin.debug:
        msg: "WARNING: Status code 207 received - one or more LPARs failed to perform the activation task"
      when: response.status == 207

    - name: Printing the response for installation
      tags: owner, install, retry
      ansible.builtin.debug:
        msg: "{{ response.json }}"

    - name: Wait for 15 seconds
      ansible.builtin.pause:
        seconds: 15

    # Extract all task IDs from response
    - name: Extract task IDs dynamically
      tags: owner, install, retry
      ansible.builtin.set_fact:
        task_ids: >-
          {{
            response.json
            | dict2items
            | map(attribute='value')
            | map('dict2items')
            | flatten
            | map(attribute='value')
            | selectattr('task-id', 'defined')
            | map(attribute='task-id')
            | list
          }}

    - name: Print extracted task IDs
      tags: owner, install, retry
      ansible.builtin.debug:
        msg: >-
          {% if task_ids | length > 0 %}
            Task IDs for active LPARs: {{ task_ids | join(', ') }}
          {% else %}
            No task IDs found — activation failed.
          {% endif %}

    - name: Fail playbook if no task IDs were generated
      tags: owner, install, retry
      ansible.builtin.fail:
        msg: >
          ❌ No task IDs Found.
          This indicates activation failed before tasks could be created.
          Please check the previous step's response for details.
      when: task_ids | length == 0

    # Phase 1: Poll for 20 minutes
    - name: Poll tasks status - Phase 1
      tags: retry
      ansible.builtin.uri:
        url: "{{ acc_url }}/tasks/{{ item }}/status"
        method: GET
        headers:
          Authorization: "Bearer {{ access_token }}"
        validate_certs: false
        return_content: true
        status_code: [200, 401]
      loop: "{{ task_ids }}"
      loop_control:
        label: "Task {{ item }}"
      register: poll_status_phase1
      retries: 35
      delay: 40
      until: >
        (poll_status_phase1.status == 200 and
         poll_status_phase1.json.get("action-status") in ["Success", "Failed"]) or
        poll_status_phase1.status == 401
      failed_when: false
      ignore_errors: true

    # Check if Phase 1 completed successfully
    - name: Check if all tasks completed in phase 1
      tags: retry
      ansible.builtin.set_fact:
        phase1_completed: >-
          {{
            poll_status_phase1.results
            | selectattr('status', 'equalto', 200)
            | selectattr('json.action-status', 'in', ['Success', 'Failed'])
            | list | length == task_ids | length
          }}

    # Refresh token before Phase 2
    - name: Wait for user to generate OTP for owner (Phase 2 token refresh)
      tags: retry
      ansible.builtin.pause:
        prompt: "Enter OTP generated from your owner mfa_secret for Phase 2 token refresh:"
      register: mfa_owner_otp_phase2
      when:
        - not phase1_completed
        - mfa_enabled | bool

    - name: Refresh authentication token for Phase 2
      tags: retry
      ansible.builtin.uri:
        url: "{{ acc_url }}/user/token"
        method: POST
        body:
          username: "{{ cc_owner_user }}"
          password: "{{ cc_owner_password }}"
          otp: "{{ (mfa_owner_otp_phase2.user_input if mfa_enabled else omit) }}"
        body_format: json
        return_content: true
        validate_certs: false
      register: auth_response_refresh
      when: not phase1_completed

    - name: Update access token
      tags: retry
      ansible.builtin.set_fact:
        access_token: "{{ auth_response_refresh.json.access_token }}"
      when: not phase1_completed

    # Phase 2: Poll for another 20 minutes with fresh token
    - name: Poll tasks status - Phase 2
      tags: retry
      ansible.builtin.uri:
        url: "{{ acc_url }}/tasks/{{ item }}/status"
        method: GET
        headers:
          Authorization: "Bearer {{ access_token }}"
        validate_certs: false
        return_content: true
      loop: "{{ task_ids }}"
      loop_control:
        label: "Task {{ item }}"
      register: poll_status_phase2
      retries: 35
      delay: 40
      until: >
        poll_status_phase2.json.get("action-status") in ["Success", "Failed"]
      when: not phase1_completed

    # Combine results from both phases
    - name: Set final poll status
      tags: retry
      ansible.builtin.set_fact:
        poll_status: "{{ poll_status_phase1 if phase1_completed else poll_status_phase2 }}"

    - name: Evaluate all task results
      tags: retry
      ansible.builtin.set_fact:
        acc_failed_tasks: >-
          {{
            poll_status.results
            | selectattr('json.action-status', 'match', '(?i)fail|error')
            | list
          }}

    - name: Fail play if any task failed
      tags: retry
      ansible.builtin.fail:
        msg: |
          ❌ One or more ACC install tasks failed.
          {% for task in acc_failed_tasks %}
          Task ID: {{ task.item }}
          Status: {{ task.json }}
          {% endfor %}
      when: acc_failed_tasks | length > 0

    - name: "Success message if both completed"
      tags: retry
      ansible.builtin.debug:
        msg: "✅ AI Optimizer installation task finished successfully."
