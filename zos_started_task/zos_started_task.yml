###############################################################################
# This playbook demonstrates how to use zos_started_task to manage z/OS started
# tasks (such as start, stop, display, cancel, force and modify) using Red Hat
# Ansible Certified Content for IBM Z.
#
# Usage:
#  ansible-playbook -i <inventory> <playbook>
#
# Example:
#  ansible-playbook -i inventories zos_started_task.yml
#
# Requirements:
#   IBM z/OS core collection 1.16.0 or later.
#
###############################################################################

- name: Sample zos_started_task playbook.
  hosts: zos_host
  collections:
    - "ibm.ibm_zos_core"
  gather_facts: false
  environment: "{{ environment_vars }}"

  vars:
    jcl_file: "{{ playbook_dir }}/files/sample.jcl"

  tasks:
    # #######################################################################################
    # This task copies a sample JCL file to a z/OS dataset member (MEM1). The JCL contains
    # a simple script that executes a sleep command, which is used for demonstration purposes
    # in this playbook.
    # #######################################################################################
    - name: Copy sample JCL containing sleep command to 'MEM1' member
      zos_copy:
        src: "{{ jcl_file }}"
        dest: "USER.PRIVATE.PROCLIB(MEM1)"
        replace: True
      register: copy_out
    - name: print copy_out
      debug:
        msg:
          - "{{ copy_out }}"

    # #######################################################################################
    # Start a started task using PDS Member name which contains JCL to run as a started task.
    # The parameters which are commented below, can be used with respective values.
    # #######################################################################################
    - name: Start a started task with JCL stored in 'MEM1' and have output written to system logs
      zos_started_task:
          state: started
          member: MEM1
          reus_asid: True
          wait_time: 30
          wait_full_time: True
          system_logs: True
          verbose: True
      register: start_out
    - name: print start_out
      debug:
        msg:
          - "{{ start_out }}"

    # #######################################################################################
    # Display details of a running started task using started task name and other params.
    # The parameters which are commented below, can be used with respective values.
    # #######################################################################################
    - name: Display the status of started task 'MEM1' using task ID 'STC00266' and identifier 'MEM1'
      zos_started_task:
          state: displayed
          job: MEM1
          task_id: STC00266
          identifier: vlf
          system_logs: True
          verbose: True
      register: display_out
    - name: print display_out
      debug:
        msg:
          - "{{ display_out }}"

    # #######################################################################################
    # Cancel a running started task using a started task name and other params.
    # The parameters which are commented below, can be used with respective values.
    # #######################################################################################
    - name: Cancel the started task 'MEM1'
      zos_started_task:
          state: cancelled
          job: MEM1
      register: cancel_out
    - name: print cancel_out
      debug:
        msg:
          - "{{ cancel_out }}"

    # #######################################################################################
    # Modify a running started task using started task name and other params.
    # The parameters which are commented below, can be used with respective values.
    # System started tasks like VLF can be modified using list of params 'replace', 'nn=02'
    # #######################################################################################
    - name: Modify 'VLF' started task to replace configuration for class 02
      zos_started_task:
          state: modified
          job: VLF
          parameters:
            - "REPLACE"
            - "NN=02"
          system_logs: True
          verbose: True
      register: modify_out
    - name: print modify_out
      debug:
        msg:
          - "{{ modify_out }}"

    # #######################################################################################
    # Stop a running started task using started task name and other params.
    # The parameters which are commented below, can be used with respective values.
    # System started task like VLF can be stopped.
    # #######################################################################################
    - name: Stop the started task 'VLF'
      zos_started_task:
          state: stopped
          job: VLF
          verbose: True
          system_logs: True
      register: stop_out
    - name: print stop_out
      debug:
        msg:
          - "{{ stop_out }}"

    # #######################################################################################
    # Force a running started task using started task name and other params.
    # The parameters which are commented below, can be used with respective values.
    # System started tasks like TSO, JES2, TCPIP, ICSF ..etc can be forced
    # #######################################################################################
    - name: Forcefully terminate the ICSF started task without graceful shutdown
      zos_started_task:
          state: forced
          job: ICSF
          system_logs: True
          verbose: True
      register: force_out
    - name: print force_out
      debug:
        msg:
          - "{{ force_out }}"

    # #######################################################################################
    # Delete PDS member 'MEM1' which got created for testing purpose
    # #######################################################################################
    - name: Remove PDS Member MEM1
      zos_data_set:
        name: 'user.private.proclib(mem1)'
        state: absent
        type: member

    # #######################################################################################
    # Start default started task 'ICSF' which got stopped in previous steps
    # #######################################################################################
    - name: Start the started task 'ICSF' which got stopped in previous steps
      zos_started_task:
          state: started
          member: ICSF
          system_logs: True
          verbose: True
      register: start_out
    - name: print start_out
      debug:
        msg:
          - "{{ start_out }}"
    
    # #######################################################################################
    # Start default started task 'VLF' which got stopped in previous steps
    # #######################################################################################
    - name: Start the started task 'VLF' which got stopped in previous steps
      zos_started_task:
          state: started
          member: VLF
          subsystem: MSTR
          system_logs: True
      register: start_out
    - name: print start_out
      debug:
        msg:
          - "{{ start_out }}"