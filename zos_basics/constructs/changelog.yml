releases:
  2020.05.19:
    date: 2020-05-19
    changes:
      added:
        - Released initial version
  2021.08.06:
    date: 2021-08-06
    changes:
      added:
        - Site playbook for consistency with playbook design
        - Added requirements-check role that can evaluate the playbooks requirements and pass or fail playbook execution
        - Added runtime-requirements.txt that lists the requirements needed for this playbook to execute
      minor:
        - Changed dependency from Ansible 2.10 to 2.11 to align with the collections supported Ansible
  2024.04.11:
    date: 2024-04-11
    changes:
      fixed:
        - Lower case zos_job_submit module option 'location' per ibm.ibm_zos_core:1.10.0 requirements.
      removed:
        - Remove deprecated zos_job_submit module option 'wait'.
  2026.06.09:
    date: 2026-06-18
    changes:
      fixed:
        - Updated return values 'ddnames' to 'dds' and 'ddname' to 'dd_name' per ibm.ibm_zos_core:2.0.0 zos_job_submit changes.
        - Rename option 'location' to 'remote_src' and change parameter from string to boolean per ibm.ibm_zos_core:2.0.0 zos_job_submit breaking changes.
      minor:
        - Updated documentation and requirements for ibm.ibm_zos_core:2.0.0 compatibility.
