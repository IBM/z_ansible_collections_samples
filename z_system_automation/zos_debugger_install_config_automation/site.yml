# Main playbook to execute all z/OS Debugger installation and configuration playbooks in order
# Usage: ansible-playbook site.yml -i inventories/inventory.yml -vvv

- name: Execute z/OS Debugger Installation and Configuration
  hosts: localhost
  gather_facts: false

  tasks:
    # Show installation start message
    - name: Display start message
      debug:
        msg: "Starting z/OS Debugger installation and configuration process..."

    # Announce cleanup step
    - name: Step 1 - Cleanup
      debug:
        msg: "Executing Cleanup.yml..."

- import_playbook: Cleanup.yml

- name: Cleanup Complete
  hosts: localhost
  gather_facts: false
  tasks:
    # Confirm cleanup finished
    - name: Cleanup completed
      debug:
        msg: "✓ Cleanup completed successfully"

