- name: Keystore Creation
  hosts: zos_host
  environment: "{{ environment_vars }}"
  vars_files: "variables.yml"
  collections:
    - ibm.ibm_zos_core
  gather_facts: false

  tasks:

    # prompts the user for keystore creation

    # Install Python pexpect library for interactive commands
    - name: "Python library pexpect install"
      shell: pip install pexpect

    # Ask user if they want to create keystore
    - name: Prompt for keystore creation if not set
      pause:
        prompt: "Do you want to create keystore? (yes/no)"
      register: keystore_response
      when: not (keystore | default(false) | bool)


    # Set flag based on user response or variable
    - name: Set keystore creation flag
      set_fact:
        create_keystore: "{{ (keystore | default(false) | bool) or (keystore_response.user_input | default('no') | lower in ['yes', 'y']) }}"

    # prompts the user for keystore password and location

    # Execute keystore creation if user confirmed
    - name: Execute keystore creation tasks
      block:
        # Prompt user for keystore password securely
        - name: Prompt for keystore password
          pause:
            prompt: "Enter the keystore password"
            echo: no
          register: keystore_password_input

        # Create configuration directory for keystore
        - name: Create keystore directory if it doesn't exist
          file:
            path: "{{ CFGDIR }}"
            state: directory
            mode: '0755'
          
        # Generate encrypted password file for RDS
        - name: Generate password
          ansible.builtin.expect:
            command: "sh -c 'export JAVA_HOME={{ JAVADIR }} && ./genpassword.sh -t=rds -f=$PWD/rds_password.properties'"
            responses:
              'Specify the password to the Remote Debug Service keystore file:': "{{ keystore_password_input.user_input }}"
            timeout: 60
            chdir: "{{ eqa_path_prefix }}usr/lpp/IBM/debug/headless-code-coverage/bin"

        # Create Java keystore with RSA key pair
        - name: Generate Keystore JKS file
          ansible.builtin.expect:
            command: sh -c '{{ JAVADIR }}/bin/keytool -genkey -alias rmtd -keyalg RSA -storetype JKS -keystore {{ CFGDIR }}/keystore.jks -validity 480'
            responses:
              'Enter keystore password:': "{{ keystore_password_input.user_input }}"
              'Re-enter new password:': "{{ keystore_password_input.user_input }}"
              'What is your first and last name?': " "
              'What is the name of your organizational unit?': " "
              'What is the name of your organization?': " "
              'What is the name of your City or Locality?': " "
              'What is the name of your State or Province?': " "
              'What is the two-letter country code for this unit?': " "
              'Is CN=.*correct\?': "yes"
              'Enter key password for <rmtd>': "{{ keystore_password_input.user_input }}"
            timeout: 200
            creates: "{{ CFGDIR }}/keystore.jks"

        # Export certificate from keystore
        - name: Generate Keystore CRT file
          ansible.builtin.expect:
            command: sh -c '{{ JAVADIR }}/bin/keytool -export -keystore {{ CFGDIR }}/keystore.jks -alias rmtd -storetype JKS -file {{ CFGDIR }}/rmtd.cer -rfc'
            responses:
              'Enter keystore password:': "{{ keystore_password_input.user_input }}"
        
        # Set keystore file permissions
        - name: Set keystore permissions
          shell: chmod 777 {{ CFGDIR }}/keystore.jks

        # Save keystore password to variables file
        - name: Update variables.yml with keystore password
          lineinfile:
            path: variables.yml
            regexp: '^keystore_password:'
            line: 'keystore_password: {{ keystore_password_input.user_input }}'
          delegate_to: localhost

        # Save keystore path to variables file
        - name: Update variables.yml with keystore file path
          lineinfile:
            path: variables.yml
            regexp: '^keystoreFile:'
            line: 'keystoreFile: {{ CFGDIR }}/keystore.jks'
          delegate_to: localhost

        # Show where keystore files were created
        - name: Display keystore location
          debug:
            msg: "Keystore files created at: {{ CFGDIR }}/keystore.jks and {{ CFGDIR }}/rmtd.cer"

        # Confirm variables file was updated
        - name: Display variables update
          debug:
            msg: "Updated variables.yml with keystore_password and keystoreFile"
      
      when: create_keystore | bool

